<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Legacy UI Deprecated</title>
    <link rel="stylesheet" href="./styles.css" />
    <style>
      .cta-link {
        display: inline-block;
        border: 1px solid var(--accent);
        background: var(--accent);
        color: #fff;
        text-decoration: none;
        padding: 8px 12px;
      }
    </style>
  </head>
  <body>
    <div class="page">
      <main class="main-container">
        <section class="panel">
          <h1 class="page-title">Legacy UI Deprecated</h1>
          <p class="note">
            The old single-page console is deprecated. Please use the Play UI for
            current gameplay flow.
          </p>
          <div class="inline">
            <a id="playLink" class="cta-link" href="./play.html">Open Play UI</a>
            <a href="./debug.html">Open Debug UI</a>
          </div>
          <p class="note" id="redirectNote">
            Redirecting to Play UI in 3 seconds...
          </p>
        </section>
      </main>
    </div>
    <script>
      (function () {
        const target = new URL("./play.html", window.location.href);
        if (window.location.search) {
          target.search = window.location.search;
        }
        const link = document.getElementById("playLink");
        if (link) {
          link.href = target.toString();
        }
        window.setTimeout(() => {
          window.location.assign(target.toString());
        }, 3000);
      })();
    </script>
  </body>
</html>
